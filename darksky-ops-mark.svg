<svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Darksky Ops logomark">
  <title>Darksky Ops</title>

  <!-- Dark background recommended. Transparent bg. -->

  <!-- Outer hexagon: r=70, center 80,80 -->
  <polygon
    stroke="#4af0b0" fill="none" stroke-width="1.5" opacity="0.35"
    points="80,10 149.28,50 149.28,130 80,170 10.72,130 10.72,50"
  />

  <!-- Middle hexagon: r=50 -->
  <polygon
    stroke="#4af0b0" fill="none" stroke-width="1.5" opacity="0.65"
    points="80,30 123.3,55 123.3,105 80,130 36.7,105 36.7,55"
  />

  <!-- Inner hexagon: r=28 -->
  <polygon
    stroke="#4af0b0" fill="none" stroke-width="1" opacity="0.4"
    points="80,52 104.25,66 104.25,94 80,108 55.75,94 55.75,66"
  />

  <!-- Crosshair vertical -->
  <line stroke="#4af0b0" stroke-width="1.5" x1="80" y1="30" x2="80" y2="60" opacity="0.8"/>
  <line stroke="#4af0b0" stroke-width="1.5" x1="80" y1="100" x2="80" y2="130" opacity="0.8"/>

  <!-- Crosshair horizontal -->
  <line stroke="#4af0b0" stroke-width="1.5" x1="36.7" y1="80" x2="62" y2="80" opacity="0.8"/>
  <line stroke="#4af0b0" stroke-width="1.5" x1="98" y1="80" x2="123.3" y2="80" opacity="0.8"/>

  <!-- Diagonal accents -->
  <line stroke="#4af0b0" stroke-width="0.75" x1="99" y1="60" x2="108" y2="51" opacity="0.3"/>
  <line stroke="#4af0b0" stroke-width="0.75" x1="61" y1="100" x2="52" y2="109" opacity="0.3"/>

  <!-- Center circle -->
  <circle fill="#4af0b0" cx="80" cy="80" r="6"/>

  <!-- Vertex ticks -->
  <circle fill="#4af0b0" cx="80"    cy="30"  r="2.5" opacity="0.5"/>
  <circle fill="#4af0b0" cx="123.3" cy="55"  r="2.5" opacity="0.5"/>
  <circle fill="#4af0b0" cx="123.3" cy="105" r="2.5" opacity="0.5"/>
  <circle fill="#4af0b0" cx="80"    cy="130" r="2.5" opacity="0.5"/>
  <circle fill="#4af0b0" cx="36.7"  cy="105" r="2.5" opacity="0.5"/>
  <circle fill="#4af0b0" cx="36.7"  cy="55"  r="2.5" opacity="0.5"/>
</svg>
