<svg viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Darksky Ops logo — light variant">
  <title>Darksky Ops (Light)</title>

  <!-- ══ LOGOMARK ══ -->

  <!-- Outer hexagon -->
  <polygon
    stroke="#006644" fill="none" stroke-width="1.5" opacity="0.3"
    points="80,10 149.28,50 149.28,130 80,170 10.72,130 10.72,50"
  />

  <!-- Middle hexagon -->
  <polygon
    stroke="#006644" fill="none" stroke-width="1.5" opacity="0.6"
    points="80,30 123.3,55 123.3,105 80,130 36.7,105 36.7,55"
  />

  <!-- Inner hexagon -->
  <polygon
    stroke="#006644" fill="none" stroke-width="1" opacity="0.35"
    points="80,52 104.25,66 104.25,94 80,108 55.75,94 55.75,66"
  />

  <!-- Crosshair -->
  <line stroke="#006644" stroke-width="1.5" x1="80" y1="30" x2="80" y2="60" opacity="0.7"/>
  <line stroke="#006644" stroke-width="1.5" x1="80" y1="100" x2="80" y2="130" opacity="0.7"/>
  <line stroke="#006644" stroke-width="1.5" x1="36.7" y1="80" x2="62" y2="80" opacity="0.7"/>
  <line stroke="#006644" stroke-width="1.5" x1="98" y1="80" x2="123.3" y2="80" opacity="0.7"/>

  <!-- Center dot -->
  <circle fill="#006644" cx="80" cy="80" r="5"/>

  <!-- Vertex ticks -->
  <circle fill="#006644" cx="80"    cy="30"  r="2" opacity="0.45"/>
  <circle fill="#006644" cx="123.3" cy="55"  r="2" opacity="0.45"/>
  <circle fill="#006644" cx="123.3" cy="105" r="2" opacity="0.45"/>
  <circle fill="#006644" cx="80"    cy="130" r="2" opacity="0.45"/>
  <circle fill="#006644" cx="36.7"  cy="105" r="2" opacity="0.45"/>
  <circle fill="#006644" cx="36.7"  cy="55"  r="2" opacity="0.45"/>

  <!-- ══ WORDMARK ══ -->
  <text
    fill="#0a0a0f"
    font-family="'Syne', sans-serif"
    font-weight="700"
    font-size="32"
    letter-spacing="4"
    text-transform="uppercase"
    x="175" y="74"
  >DARKSKY OPS</text>

  <!-- Divider -->
  <line x1="175" y1="86" x2="390" y2="86" stroke="#c0c0cc" stroke-width="0.75"/>

  <!-- Tagline -->
  <text
    fill="#888899"
    font-family="'DM Mono', monospace"
    font-size="11"
    letter-spacing="3.5"
    x="175" y="104"
  >COVERT NETWORK SECURITY</text>
</svg>
