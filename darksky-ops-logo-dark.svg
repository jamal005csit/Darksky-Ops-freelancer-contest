<svg viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Darksky Ops logo">
  <title>Darksky Ops</title>
  <defs>
    <!-- Dark background version -->
    <style>
      .logo-mark-stroke { stroke: #4af0b0; fill: none; }
      .logo-mark-fill   { fill: #4af0b0; }
      .logo-wordmark    { fill: #e8e8f0; font-family: 'Syne', sans-serif; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
      .logo-tagline     { fill: #7a7a90; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.25em; }
    </style>
  </defs>

  <!-- ═══════════════════════════════
       LOGOMARK — Hexagonal Sight
       Geometry: two nested regular hexagons
       + crosshair + center circle.
       Construction on 80×80 grid, centered at (80,80)
  ════════════════════════════════ -->

  <!-- Outer hexagon: radius 70 -->
  <polygon
    class="logo-mark-stroke"
    stroke-width="1.5"
    opacity="0.35"
    points="
      80,10
      149.28,50
      149.28,130
      80,170
      10.72,130
      10.72,50
    "
  />

  <!-- Middle hexagon: radius 50 -->
  <polygon
    class="logo-mark-stroke"
    stroke-width="1.5"
    opacity="0.65"
    points="
      80,30
      123.3,55
      123.3,105
      80,130
      36.7,105
      36.7,55
    "
  />

  <!-- Inner hexagon: radius 28 -->
  <polygon
    class="logo-mark-stroke"
    stroke-width="1"
    opacity="0.4"
    points="
      80,52
      104.25,66
      104.25,94
      80,108
      55.75,94
      55.75,66
    "
  />

  <!-- Crosshair — vertical -->
  <line class="logo-mark-stroke" stroke-width="1.5" x1="80" y1="30" x2="80" y2="60" opacity="0.7"/>
  <line class="logo-mark-stroke" stroke-width="1.5" x1="80" y1="100" x2="80" y2="130" opacity="0.7"/>

  <!-- Crosshair — horizontal -->
  <line class="logo-mark-stroke" stroke-width="1.5" x1="36.7" y1="80" x2="62" y2="80" opacity="0.7"/>
  <line class="logo-mark-stroke" stroke-width="1.5" x1="98" y1="80" x2="123.3" y2="80" opacity="0.7"/>

  <!-- Diagonal accents (45°) — upper right / lower left -->
  <line class="logo-mark-stroke" stroke-width="0.75" x1="99" y1="60" x2="108" y2="51" opacity="0.3"/>
  <line class="logo-mark-stroke" stroke-width="0.75" x1="61" y1="100" x2="52" y2="109" opacity="0.3"/>

  <!-- Center dot -->
  <circle class="logo-mark-fill" cx="80" cy="80" r="5"/>

  <!-- Small tick marks at hex vertices (middle hex) -->
  <circle class="logo-mark-fill" cx="80"    cy="30"  r="2" opacity="0.5"/>
  <circle class="logo-mark-fill" cx="123.3" cy="55"  r="2" opacity="0.5"/>
  <circle class="logo-mark-fill" cx="123.3" cy="105" r="2" opacity="0.5"/>
  <circle class="logo-mark-fill" cx="80"    cy="130" r="2" opacity="0.5"/>
  <circle class="logo-mark-fill" cx="36.7"  cy="105" r="2" opacity="0.5"/>
  <circle class="logo-mark-fill" cx="36.7"  cy="55"  r="2" opacity="0.5"/>

  <!-- ═══════════════════════════════
       WORDMARK
  ════════════════════════════════ -->
  <text
    class="logo-wordmark"
    x="175" y="74"
    font-size="32"
  >DARKSKY OPS</text>

  <!-- Divider rule -->
  <line x1="175" y1="86" x2="390" y2="86" stroke="#3a3a50" stroke-width="0.75"/>

  <!-- Tagline -->
  <text class="logo-tagline" x="175" y="104">
    COVERT NETWORK SECURITY
  </text>
</svg>
